# fly.toml app configuration file generated for diktat-relay on 2026-06-04T14:13:43+01:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'diktat-relay'
primary_region = 'lhr'

[build]

[http_service]
  internal_port = 8080
  force_https = true
  # Keep one machine always running. The relay holds long-lived, near-idle
  # WebSockets (a daemon's keep-alive is just one ping every 30s), and Fly's
  # auto-stop will suspend a machine it considers idle — which freezes the TCP
  # socket, so the daemon's ping gets no pong and it reconnect-loops forever.
  # min_machines_running = 1 stops that. auto_stop can still scale extra
  # machines down; the floor of 1 keeps the connection holder alive.
  auto_stop_machines = 'suspend'
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
