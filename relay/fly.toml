# fly.toml app configuration file generated for diktat-relay on 2026-06-04T14:13:43+01:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'diktat-relay'
primary_region = 'lhr'

[build]

[http_service]
  internal_port = 8080
  force_https = true
  # Sleep when idle, wake on connection. The relay only needs to be up while a
  # daemon (or phone) is connected — Fly keeps a machine running as long as there
  # are active WebSockets, and suspends it (fast resume) when there are none. So
  # you pay only while a machine is actually in use.
  auto_stop_machines = 'suspend'
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
