appId: com.graveion.diktat
---
- launchApp:
    clearState: false

- tapOn:
    point: "27%,64%"
- waitForAnimationToEnd

- assertVisible: "Pacer"
- tapOn:
    id: "session-card-mock-session-001"
- waitForAnimationToEnd
- waitForAnimationToEnd
- waitForAnimationToEnd
- takeScreenshot: "debug_01_after_load"

# Swipe DOWN (finger moves down = scroll UP toward top of content)
- swipe:
    start: "50%, 40%"
    end: "50%, 85%"
- waitForAnimationToEnd
- swipe:
    start: "50%, 40%"
    end: "50%, 85%"
- waitForAnimationToEnd
- takeScreenshot: "debug_02_scrolled_to_top"

# Swipe UP (finger moves up = scroll DOWN toward bottom of content)
- swipe:
    start: "50%, 85%"
    end: "50%, 40%"
- waitForAnimationToEnd
- swipe:
    start: "50%, 85%"
    end: "50%, 40%"
- waitForAnimationToEnd
- takeScreenshot: "debug_03_scrolled_to_bottom"
