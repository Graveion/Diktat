appId: com.graveion.diktat
---
# Settings sheet test: opens the sheet and exercises individual options.
#
# The sheet's rows are now individually accessible (SettingsSheet wraps its
# content in a plain View instead of a TouchableOpacity, so iOS no longer
# merges the children into one accessibility node), so Maestro can assert on
# and tap each option by testID.
- launchApp:
    clearState: false
- tapOn:
    point: "27%,64%"
    optional: true
- waitForAnimationToEnd
- tapOn:
    point: "93%,94%"
    optional: true
- assertVisible:
    text: ".*MacBook Pro.*"
- tapOn:
    text: ".*MacBook Pro.*"
- waitForAnimationToEnd
- assertVisible: "storefront"

# Resume session so the chat header (with the settings gear) is visible
- tapOn:
    id: "session-card-9f3c1a7042e8"
- waitForAnimationToEnd
- waitForAnimationToEnd

# Open settings
- assertVisible:
    id: "settings-button"
- tapOn:
    id: "settings-button"
- waitForAnimationToEnd
- waitForAnimationToEnd
- takeScreenshot: "maestro/screenshots/settings_01_open"

# Individual options are now reachable by testID
- assertVisible:
    id: "micmode-toggle"
- assertVisible:
    id: "micmode-hold"
- assertVisible:
    id: "settings-done-button"

# Tap a microphone-mode option
- tapOn:
    id: "micmode-hold"
- waitForAnimationToEnd
- tapOn:
    id: "micmode-toggle"
- waitForAnimationToEnd
- takeScreenshot: "maestro/screenshots/settings_02_options"

# Feedback & Support section
- assertVisible:
    id: "open-privacy"
- assertVisible:
    id: "rate-app"
- tapOn:
    id: "open-feedback"
- waitForAnimationToEnd
- assertVisible:
    id: "feedback-input"
- assertVisible:
    id: "feedback-kind-bug"
- takeScreenshot: "maestro/screenshots/settings_03_feedback"
- tapOn:
    id: "feedback-back"
- waitForAnimationToEnd

# Close the sheet and confirm it dismissed
- tapOn:
    id: "settings-done-button"
- waitForAnimationToEnd
- waitForAnimationToEnd
- assertNotVisible:
    id: "settings-done-button"
