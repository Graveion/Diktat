appId: com.graveion.diktat
---
# Slash-command rail (cursor session) + tool drawer expansion.
- launchApp:
    clearState: false
- tapOn:
    point: "27%,64%"
    optional: true
- waitForAnimationToEnd
- assertVisible: "storefront"

- tapOn:
    id: "session-card-mock-session-001"
- waitForAnimationToEnd
- waitForAnimationToEnd
- waitForAnimationToEnd

# Slash rail shows the cursor command set
- assertVisible:
    id: "slash-/plan"
- assertVisible:
    id: "slash-/ask"
- assertVisible:
    id: "slash-/compress"
- takeScreenshot: "maestro/screenshots/rail_01_visible"

# Tapping a slash chip prefixes the input
- tapOn:
    id: "slash-/plan"
- waitForAnimationToEnd
- assertVisible: "/plan"
- takeScreenshot: "maestro/screenshots/rail_02_applied"

# Clear the input so the rail filter resets
- tapOn:
    id: "message-input"
- eraseText
- waitForAnimationToEnd

# Tool drawer: scroll up to the tool card and expand it.
# formatToolLabel renders toolName "Edit:rateLimiter.ts" as the label
# "Editing rateLimiter.ts". The icon + label + chevron collapse into one
# accessibility node ("✏️, Editing rateLimiter.ts, ▸"), so selectors use a
# .*-wrapped regex (Maestro text matching is a full match). scrollUntilVisible
# doesn't drive this ScrollView, and a fixed swipe count is fragile (message
# heights vary), so swipe up in small increments until the tool card is visible.
- repeat:
    times: 12
    while:
      notVisible:
        text: ".*Editing rateLimiter.*"
    commands:
      - swipe:
          start: "50%, 35%"
          end: "50%, 70%"
      - waitForAnimationToEnd
- assertVisible:
    text: ".*Editing rateLimiter.*"
# Tap to expand. The drawer renders below the chip; if the chip sat near the
# bottom edge the diff/output may be below the fold, so reveal them with a
# bounded small-swipe loop before asserting.
- tapOn:
    text: ".*Editing rateLimiter.*"
- waitForAnimationToEnd
- repeat:
    times: 6
    while:
      notVisible:
        text: ".*diff.*"
    commands:
      - swipe:
          start: "50%, 70%"
          end: "50%, 40%"
      - waitForAnimationToEnd
- assertVisible:
    text: ".*diff.*"
- assertVisible:
    text: ".*output.*"
- takeScreenshot: "maestro/screenshots/tool_01_expanded"
