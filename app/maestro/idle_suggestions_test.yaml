appId: com.graveion.diktat
---
# Idle suggestions: after the (mock-shortened, 1.5s) idle delay with no input,
# the suggestion chips fade in. Tapping one sends it.
- launchApp:
    clearState: false
- tapOn:
    point: "27%,64%"
    optional: true
- waitForAnimationToEnd
- assertVisible: "Pacer"

# Resume the normal session and let history settle
- tapOn:
    id: "session-card-mock-session-001"
- waitForAnimationToEnd
- waitForAnimationToEnd

# Idle chips appear after the shortened delay (mock idleDelayMs = 1500ms).
# Poll up to 5s so the test isn't sensitive to exact timing.
- extendedWaitUntil:
    visible:
      id: "idle-suggestions"
    timeout: 5000
- assertVisible:
    id: "idle-chip-0"
- takeScreenshot: "maestro/screenshots/idle_01_shown"

# Tapping a chip sends it and hides the suggestions
- tapOn:
    id: "idle-chip-0"
- waitForAnimationToEnd
- extendedWaitUntil:
    notVisible:
      id: "idle-suggestions"
    timeout: 5000
- takeScreenshot: "maestro/screenshots/idle_02_sent"
