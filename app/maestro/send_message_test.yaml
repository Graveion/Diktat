appId: com.graveion.diktat
---
# Send-message flow: type into the input and send; the mock appends a user bubble.
- launchApp:
    clearState: false
- tapOn:
    point: "27%,64%"
    optional: true
- waitForAnimationToEnd
- tapOn:
    point: "93%,94%"
    optional: true
- assertVisible:
    text: ".*MacBook Pro.*"
- tapOn:
    text: ".*MacBook Pro.*"
- waitForAnimationToEnd
- assertVisible: "storefront"

# Resume the mock session and wait for history
- tapOn:
    id: "session-card-9f3c1a7042e8"
- waitForAnimationToEnd
- waitForAnimationToEnd
- waitForAnimationToEnd

# Type a message
- tapOn:
    id: "message-input"
- waitForAnimationToEnd
- tapOn:
    id: "message-input"
- inputText: "hello from maestro"
- waitForAnimationToEnd
- assertVisible: "hello from maestro"
- takeScreenshot: "maestro/screenshots/send_01_typed"

# Send it → mock appends a user bubble with the same text
- tapOn:
    id: "send-button"
- waitForAnimationToEnd
- waitForAnimationToEnd
- assertVisible: "hello from maestro"
- takeScreenshot: "maestro/screenshots/send_02_sent"
